<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Rogue-Maze: 난이도 곡선 설계 제안 및 시뮬레이터</title>
    <!-- Google Fonts 탑재 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700;900&display=swap"
        rel="stylesheet">

    <style>
        /* ==========================================================================
           1. Core Design System & CSS Reset
           ========================================================================== */
        :root {
            --bg-darker: #05060b;
            --bg-dark: #090b11;
            --bg-card: rgba(15, 18, 28, 0.7);
            --border-neon-cyan: rgba(0, 240, 255, 0.25);
            --border-neon-magenta: rgba(255, 0, 85, 0.25);

            --neon-cyan: #00f0ff;
            --neon-magenta: #ff0055;
            --neon-purple: #b026ff;
            --neon-green: #39ff14;
            --neon-yellow: #ffdf00;

            --text-primary: #f0f3fa;
            --text-secondary: #90a0c0;
            --text-muted: #5a6b8c;

            --glow-cyan: 0 0 15px rgba(0, 240, 255, 0.4);
            --glow-magenta: 0 0 15px rgba(255, 0, 85, 0.4);
            --glow-purple: 0 0 15px rgba(176, 38, 255, 0.4);
            --glow-green: 0 0 15px rgba(57, 255, 20, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-darker);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            background-image:
                radial-gradient(at 0% 0%, rgba(0, 240, 255, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 0, 85, 0.03) 0px, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.003) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.003) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
        }

        /* 스크롤바 디자인 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-darker);
        }

        ::-webkit-scrollbar-thumb {
            background: #1a2233;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-cyan);
            box-shadow: var(--glow-cyan);
        }

        /* ==========================================================================
           2. Layout Elements
           ========================================================================== */
        header {
            padding: 3rem 2rem 2rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            background: linear-gradient(to bottom, #07090f, var(--bg-darker));
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-magenta), transparent);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .logo-tag {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--neon-cyan);
            text-shadow: var(--glow-cyan);
            font-weight: 800;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 30%, #a5c0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
        }

        .subtitle {
            color: var(--text-secondary);
            max-width: 750px;
            margin: 0 auto;
            font-size: 1.05rem;
            font-weight: 300;
        }

        .container {
            max-width: 1400px;
            margin: 2.5rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2.5rem;
        }

        @media (max-width: 1100px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* ==========================================================================
           3. Sidebar Navigation (Tabs Selector)
           ========================================================================== */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .proposal-card-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-neon-cyan);
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .proposal-card-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--neon-cyan);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .proposal-card-btn:hover {
            background: rgba(20, 28, 45, 0.8);
            border-color: var(--neon-cyan);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 240, 255, 0.05);
        }

        .proposal-card-btn.active {
            background: rgba(20, 32, 55, 0.9);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.1), inset 0 0 12px rgba(0, 240, 255, 0.05);
        }

        .proposal-card-btn.active::before {
            transform: scaleY(1);
        }

        /* 카드별 포인트 컬러링 */
        .proposal-card-btn.active.color-b::before {
            background: var(--neon-magenta);
        }

        .proposal-card-btn.active.color-b {
            border-color: var(--neon-magenta);
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.1);
        }

        .proposal-card-btn.active.color-c::before {
            background: var(--neon-purple);
        }

        .proposal-card-btn.active.color-c {
            border-color: var(--neon-purple);
            box-shadow: 0 0 20px rgba(176, 38, 255, 0.1);
        }

        .proposal-card-btn.active.color-d::before {
            background: var(--neon-green);
        }

        .proposal-card-btn.active.color-d {
            border-color: var(--neon-green);
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.1);
        }

        .btn-tag {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            align-self: flex-start;
        }

        .tag-a {
            background: rgba(0, 240, 255, 0.1);
            color: var(--neon-cyan);
        }

        .tag-b {
            background: rgba(255, 0, 85, 0.1);
            color: var(--neon-magenta);
        }

        .tag-c {
            background: rgba(176, 38, 255, 0.1);
            color: var(--neon-purple);
        }

        .tag-d {
            background: rgba(57, 255, 20, 0.1);
            color: var(--neon-green);
        }

        .btn-title {
            font-size: 1.15rem;
            font-weight: 800;
            color: #fff;
        }

        .btn-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        /* ==========================================================================
           4. Main Content Area & Dashboard
           ========================================================================== */
        main {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 3fr 2fr;
            gap: 2rem;
        }

        @media (max-width: 1000px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        /* 하이라이트 경계선 효과 */
        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            border: 1px solid transparent;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), transparent 40%, transparent 60%, rgba(255, 255, 255, 0.02)) border-box;
            pointer-events: none;
        }

        .card-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 1rem;
        }

        .card-title-main {
            font-size: 1.4rem;
            font-weight: 900;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* 캔버스 차트 감싸는 영역 */
        .chart-container {
            width: 100%;
            height: 380px;
            position: relative;
            background: rgba(4, 5, 8, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        /* 시뮬레이터 컨트롤 패널 */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-label-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .label-title {
            color: var(--text-secondary);
        }

        .label-value {
            color: var(--neon-cyan);
            font-family: 'Fira Code', monospace;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #161c2a;
            outline: none;
            transition: background 0.3s;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--neon-cyan);
            cursor: pointer;
            box-shadow: var(--glow-cyan);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* 컬러별 슬라이더 테마 */
        .color-theme-b input[type="range"]::-webkit-slider-thumb {
            background: var(--neon-magenta);
            box-shadow: var(--glow-magenta);
        }

        .color-theme-b .label-value {
            color: var(--neon-magenta);
        }

        .color-theme-c input[type="range"]::-webkit-slider-thumb {
            background: var(--neon-purple);
            box-shadow: var(--glow-purple);
        }

        .color-theme-c .label-value {
            color: var(--neon-purple);
        }

        .color-theme-d input[type="range"]::-webkit-slider-thumb {
            background: var(--neon-green);
            box-shadow: var(--glow-green);
        }

        .color-theme-d .label-value {
            color: var(--neon-green);
        }

        /* ==========================================================================
           5. Analysis & Content Formatting
           ========================================================================== */
        .content-panel {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .markdown-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .markdown-section h3 {
            font-size: 1.25rem;
            font-weight: 800;
            color: #fff;
            position: relative;
            padding-left: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .markdown-section h3::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 70%;
            background: var(--neon-cyan);
            box-shadow: var(--glow-cyan);
            border-radius: 2px;
        }

        .color-theme-b h3::before {
            background: var(--neon-magenta);
            box-shadow: var(--glow-magenta);
        }

        .color-theme-c h3::before {
            background: var(--neon-purple);
            box-shadow: var(--glow-purple);
        }

        .color-theme-d h3::before {
            background: var(--neon-green);
            box-shadow: var(--glow-green);
        }

        /* 하이라이트 문장 상자 */
        .alert-box {
            background: rgba(0, 240, 255, 0.04);
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            font-size: 0.95rem;
            color: #d1ecf1;
            position: relative;
        }

        .alert-box-b {
            background: rgba(255, 0, 85, 0.04);
            border-color: rgba(255, 0, 85, 0.15);
            color: #f8d7da;
        }

        .alert-box-c {
            background: rgba(176, 38, 255, 0.04);
            border-color: rgba(176, 38, 255, 0.15);
            color: #ebd3ff;
        }

        .alert-box-d {
            background: rgba(57, 255, 20, 0.04);
            border-color: rgba(57, 255, 20, 0.15);
            color: #d4edda;
        }

        .alert-title {
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 800px) {
            .grid-2col {
                grid-template-columns: 1fr;
            }
        }

        .experience-card {
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .experience-header {
            font-weight: 800;
            font-size: 1rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .experience-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* 장단점 테이블 */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            text-align: left;
            margin: 0.5rem 0;
        }

        th,
        td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        th {
            font-weight: 800;
            color: #fff;
            background: rgba(255, 255, 255, 0.01);
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* 코드 하이라이터 블록 */
        pre {
            background: #040508;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 1.25rem;
            overflow-x: auto;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: #e0e6ed;
            position: relative;
        }

        pre::before {
            content: 'CODE IMPLEMENTATION';
            position: absolute;
            top: 0;
            right: 0;
            background: #111622;
            padding: 0.2rem 0.6rem;
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--text-secondary);
            border-bottom-left-radius: 6px;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }

        .code-keyword {
            color: #ff79c6;
        }

        .code-comment {
            color: #6272a4;
        }

        .code-string {
            color: #f1fa8c;
        }

        .code-number {
            color: #bd93f9;
        }

        .code-function {
            color: #50fa7b;
        }

        /* ==========================================================================
           6. Synergy Matrix Interactive Tool
           ========================================================================== */
        .synergy-matrix {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card-selector-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 0.75rem;
        }

        .card-chip {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            padding: 0.6rem;
            text-align: center;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.2s ease;
            user-select: none;
        }

        .card-chip:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .card-chip.selected {
            background: rgba(0, 240, 255, 0.1);
            border-color: var(--neon-cyan);
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .color-theme-b .card-chip.selected {
            background: rgba(255, 0, 85, 0.1);
            border-color: var(--neon-magenta);
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.2);
        }

        .color-theme-c .card-chip.selected {
            background: rgba(176, 38, 255, 0.1);
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px rgba(176, 38, 255, 0.2);
        }

        .color-theme-d .card-chip.selected {
            background: rgba(57, 255, 20, 0.1);
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
        }

        .synergy-output-card {
            background: rgba(4, 5, 8, 0.7);
            border: 1px dashed rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            align-items: center;
            text-align: center;
        }

        .synergy-gauge-outer {
            width: 100%;
            height: 10px;
            background: #111520;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        .synergy-gauge-inner {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            border-radius: 5px;
            transition: width 0.4s ease;
        }

        .synergy-score-val {
            font-size: 2.2rem;
            font-weight: 900;
            font-family: 'Outfit', sans-serif;
            letter-spacing: -0.05em;
        }

        .synergy-desc-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            max-width: 450px;
        }
    </style>
</head>

<body>

    <!-- 헤더 영역 -->
    <header>
        <span class="logo-tag">System Architecture Proposal</span>
        <h1>Neon Rogue-Maze 난이도 조절 설계서</h1>
        <p class="subtitle">
            100개의 방을 극복해 탈출하는 네온 로그메이즈의 난이도 커브와 보상 획득 시너지에 관한 4가지 설계 모델 분석 및 시그널 시뮬레이터입니다.
        </p>
    </header>

    <!-- 메인 대시보드 구조 -->
    <div class="container">
        <!-- 사이드바 설계안 탭 스위처 -->
        <aside class="sidebar">
            <button class="proposal-card-btn active" onclick="switchModel('A', this)">
                <span class="btn-tag tag-a">모델 A (추천)</span>
                <span class="btn-title">도전의 대가 (Risk vs Reward)</span>
                <span class="btn-desc">쉬운 맵만 공략하면 후반에 지옥을 맛보고, 고난도를 뚫어온 자는 수월하게 클리어하는 구조.</span>
            </button>

            <button class="proposal-card-btn color-b" onclick="switchModel('B', this)">
                <span class="btn-tag tag-b">모델 B</span>
                <span class="btn-title">성장 스노우볼 (Hard Start)</span>
                <span class="btn-desc">초반에는 지옥 같은 하드코어 난이도이지만, 보상이 쌓일수록 무쌍을 찍는 정통 로그라이크 구조.</span>
            </button>

            <button class="proposal-card-btn color-c" onclick="switchModel('C', this)">
                <span class="btn-tag tag-c">모델 C</span>
                <span class="btn-title">전략적 시너지 (Build Synergies)</span>
                <span class="btn-desc">몬스터의 난이도는 정직하게 올라가며, 플레이어의 카드 연계성 빌드업에 따라 쾌감이 달라지는 빌드 중심형 구조.</span>
            </button>

            <button class="proposal-card-btn color-d" onclick="switchModel('D', this)">
                <span class="btn-tag tag-d">모델 D (추가안)</span>
                <span class="btn-title">동적 난이도 조절 (Adaptive DDA)</span>
                <span class="btn-desc">플레이어의 클리어 타임, 남은 HP, 콤보 횟수에 연계되어 AI가 실시간으로 밸런스를 맞추는 유동적 구조.</span>
            </button>
        </aside>

        <!-- 메인 분석 보드 -->
        <main id="main-panel" class="color-theme-a">

            <!-- 상단 시뮬레이터 및 차트 영역 -->
            <div class="dashboard-grid">
                <!-- 실시간 차트 카드 -->
                <div class="card">
                    <div class="card-header-flex">

        function toggleSynergyCard(id, element) {
            const index = selectedSynergyCards.indexOf(id);
            if (index > -1) {
                selectedSynergyCards.splice(index, 1);
                element.classList.remove('selected');
            } else {
                selectedSynergyCards.push(id);
                element.classList.add('selected');
            }
            calculateInteractiveSynergy();
        }

        function calculateInteractiveSynergy() {
            let mult = 1.0;
            let title = "시너지 없음";
            let desc = "개별 카드 효과만 개별 적용 중입니다. 시너지가 없어 비효율적입니다.";

            const has = (id) => selectedSynergyCards.includes(id);

            // 1. 탄막 폭격기 빌드
            if (has('multishot') && has('homing') && has('splash')) {
                mult += 1.8;
                title = "💥 [시너지] 네온 탄막 초토화 폭격기 빌드";
                desc = "부채꼴 다중 탄환이 유도로 날아가 각각 스플래시 대폭발을 발생시킵니다! 잡몹 소탕력과 단일 딜링이 우주를 뚫어 피해 증폭 계수가 2.8배에 도달합니다.";
            }
            // 2. 질풍의 뇌신 하이브리드 검사
            else if (has('sword') && has('aspd') && has('atk')) {
                mult += 1.4;
                title = "🪓 [시너지] 질풍의 마력 네온 검사 빌드";
                desc = "초고속 연사력과 묵직한 근접 넉백 베기가 융합되어 검기 도달 범위가 비약적으로 넓어지며 근접 충돌 판정 대미지가 2.4배로 격상됩니다.";
            }
            // 3. 유도 칼날 폭풍
            else if (has('sword') && has('homing')) {
                mult += 0.6;
                title = "🔮 [시너지] 차원 유도 춤추는 환영검 빌드";
                desc = "검을 휘두를 때 검기가 적을 실시간 추적하여 뒤쪽에서 습격하는 암살형 몬스터들을 자동 방어합니다. 1.6배 피해 계수를 확보합니다.";
            }
            // 4. 화력 집중 점사
            else if (has('multishot') && has('atk')) {
                mult += 0.4;
                title = "🏹 [시너지] 샷건 전탄 집중 화력 빌드";
                desc = "가까운 거리에서 부채꼴 샷건을 전탄 명중시킬 시의 힘 스케일링 계수가 상승합니다. 단일 대미지 1.4배 보정을 얻습니다.";
            }
            else if (selectedSynergyCards.length > 0) {
                desc = "카드가 추가되었으나 특별한 연계 시너지는 아직 완성되지 않았습니다. 다른 카드를 더 추가해 최적의 조합을 유도하세요.";
            }

            // UI 갱신
            document.getElementById('synergy-val').innerText = `${mult.toFixed(1)}x`;
            document.getElementById('synergy-desc').innerHTML = selectedSynergyCards.length > 0
                ? `<strong>${title}</strong><br>${desc}`
                : "카드를 선택해 시너지를 발동시키세요.";

            // 게이지 바 갱신
            const maxVal = 3.0;
            const pct = Math.min(100, (mult / maxVal) * 100);
            document.getElementById('synergy-progress').style.width = `${pct}%`;
        }

        // 슬라이더 조작 시 매개변수 실시간 갱신 및 재드로잉

        // ==========================================================================
        // 11. HTML5 Canvas 실시간 난이도 스케일러 렌더링 엔진
        // ==========================================================================
        function drawSimulationCurve() {
            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;

            ctx.clearRect(0, 0, w, h);

            // 차트 테두리 여백 바인딩
            const padding = { top: 40, right: 30, bottom: 40, left: 55 };
            const chartW = w - padding.left - padding.right;
            const chartH = h - padding.top - padding.bottom;

            // 격자선(Grid System) 드로잉
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                // 가로 격자
                let y = padding.top + (chartH / 5) * i;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(w - padding.right, y);
                ctx.stroke();

                // 세로 격자 (스테이지 표시)
                let x = padding.left + (chartW / 5) * i;
                ctx.beginPath();
                ctx.moveTo(x, padding.top);
                ctx.lineTo(x, h - padding.bottom);
                ctx.stroke();
            }

            // 축 라벨 드로잉
            ctx.fillStyle = varColor('--text-muted');
            ctx.font = '800 10px "Outfit", sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';

            // Y축 라벨
            ctx.fillText("극도의 지옥", padding.left - 12, padding.top);
            ctx.fillText("적당한 텐션", padding.left - 12, padding.top + chartH * 0.5);
            ctx.fillText("매우 쉬움", padding.left - 12, padding.top + chartH);

            // X축 라벨
            ctx.textAlign = 'center';
            ctx.fillText("1ST STG", padding.left, h - padding.bottom + 15);
            ctx.fillText("20", padding.left + chartW * 0.2, h - padding.bottom + 15);
            ctx.fillText("40", padding.left + chartW * 0.4, h - padding.bottom + 15);
            ctx.fillText("60", padding.left + chartW * 0.6, h - padding.bottom + 15);
            ctx.fillText("80", padding.left + chartW * 0.8, h - padding.bottom + 15);
            ctx.fillText("100 STG (ESCAPE)", w - padding.right, h - padding.bottom + 15);

            // 곡선 생성 연산
            const monsterPoints = [];
            const playerPoints = [];
            const difficultyPoints = [];

            for (let stage = 1; stage <= 100; stage++) {
                let monsterPower = 0;
                let playerPower = 0;
                let perceivedDiff = 0;

                const t = (stage - 1) / 99; // 0.0 ~ 1.0

                if (currentModel === 'A') {
                    // 모델 A: 리스크 대가 선택형
                    const path = params.A.selectedPath; // 0: 쉬움, 1: 보통, 2: 어려움
                    const slope = params.A.scalingSlope;

                    // 몬스터는 선형보다 약간 급격하게 후반에 스케일링
                    monsterPower = 10 + Math.pow(t, 1.8) * 80 * slope;

                    // 플레이어는 선택한 패스 등급에 따라 성장이 결정
                    if (path === 2) {
                        // 어려운 맵 선택: 스탯이 엄청난 폭발을 이루어 후반에 몬스터 추월
                        playerPower = 8 + Math.pow(t, 1.5) * 110;
                    } else if (path === 1) {
                        // 보통 맵 선택: 몬스터 성장과 거의 비슷하게 팽팽함
                        playerPower = 8 + Math.pow(t, 1.6) * 75;
                    } else {
                        // 쉬운 맵 중심: 카드 등급이 형편없어 성장이 기어가다 후반 몬스터에 발림
                        playerPower = 8 + Math.pow(t, 2.0) * 35;
                    }

                    // 체감 난이도 = 몬스터 전투력 - 플레이어 전투력 + 기본 밸런스 계수
                    // 난이도 표현 범위를 차트 높이와 대칭
                    perceivedDiff = (monsterPower / (playerPower + 2)) * 1.5;

                } else if (currentModel === 'B') {
                    // 모델 B: 성장 스노우볼
                    const startDiff = params.B.startingDiff;
                    const growExp = params.B.growthExponent;

                    // 적들은 서서히 올라감
                    monsterPower = 15 + t * 65;
                    // 플레이어는 초반엔 극단적으로 개미 스케일, 중반 이후 시너지가 폭발(지수 가속)
                    playerPower = 2 + Math.pow(t, 3.0 / (growExp + 0.1)) * 95;

                    // 체감 난이도: 초반엔 무지막지하게 높다가 스노우볼이 굴러가는 중후반부에는 급강하
                    perceivedDiff = (startDiff * (1 - t * 0.8)) * (monsterPower / (playerPower + 2)) * 0.3;

                } else if (currentModel === 'C') {
                    // 모델 C: 전략 시너지형
                    const synergy = params.C.buildSynergy / 100; // 0.0 ~ 1.0
                    const ramp = params.C.monsterRamp;

                    // 적들의 전투력은 규칙적으로 우상향
                    monsterPower = 10 + Math.pow(t, 1.3) * 70 * ramp;
                    // 플레이어 전투력은 시너지률에 곱연산으로 폭등
                    playerPower = 10 + t * 50 * (1.0 + synergy * 1.8);

                    perceivedDiff = (monsterPower / (playerPower + 1)) * 1.6;

                } else if (currentModel === 'D') {
                    // 모델 D: 실시간 DDA
                    const skill = params.D.playerSkill; // 0, 1, 2
                    const speed = params.D.adaptationSpeed;

                    // 갓핑거일수록 적들의 스펙이 미친듯이 날뜀 (상한선 돌파)
                    monsterPower = 10 + t * 60 + (skill * 25 * t * speed);
                    // 플레이어는 조작감과 보상에 의해 자연스럽게 올라감
                    playerPower = 8 + t * 65;

                    // 체감 난이도는 DDA에 의해 시종일관 팽팽한 일자선(균형선)에 가깝게 통제됨
                    let baseLine = 0.5 - (skill * 0.05); // 실력이 좋을수록 갓핑거는 좀더 타이트한 텐션선
                    perceivedDiff = baseLine + Math.sin(t * Math.PI * 3) * 0.06 * (3.5 - speed);
                }

                // 차트용 좌표 맵핑 함수 (0~100 스케일을 Chart Box 높이에 배치)
                // 난이도는 낮을수록 차트 하단, 높을수록 상단에 그려짐
                const mapX = padding.left + (stage - 1) * (chartW / 99);

                // Y 축은 위가 0이므로 (1 - 비율) 처리
                // 몬스터와 플레이어 전투력 맵핑 (최대치 120 기준)
                const mapYMonster = padding.top + chartH * (1 - Math.min(120, monsterPower) / 120);
                const mapYPlayer = padding.top + chartH * (1 - Math.min(120, playerPower) / 120);

                // 체감 난이도 스케일 맵핑 (0.0 ~ 3.0 범위를 맵핑)
                const mapYDiff = padding.top + chartH * (1 - Math.max(0, Math.min(3.0, perceivedDiff)) / 3.0);

                monsterPoints.push({ x: mapX, y: mapYMonster });
                playerPoints.push({ x: mapX, y: mapYPlayer });
                difficultyPoints.push({ x: mapX, y: mapYDiff });
            }

            // 1. 플레이어 전투력 곡선 그리기 (네온 시안)
            drawNeonLine(playerPoints, varColor('--neon-cyan'), 2.5, varColor('--glow-cyan'));
            // 2. 몬스터 전투력 곡선 그리기 (네온 마젠타)
            drawNeonLine(monsterPoints, varColor('--neon-magenta'), 2.5, varColor('--glow-magenta'));
            // 3. 유저가 체감하는 난이도 곡선 (네온 옐로우/그린)
            let diffColor = varColor('--neon-yellow');
            if (currentModel === 'B') diffColor = varColor('--neon-magenta');
            if (currentModel === 'C') diffColor = varColor('--neon-purple');
            if (currentModel === 'D') diffColor = varColor('--neon-green');
            drawNeonLine(difficultyPoints, diffColor, 4, '0 0 18px ' + diffColor, [4, 4]);

            // 범례(Legend) 그리기
            drawLegend(padding.left + 20, padding.top + 20, diffColor);
        }

        // 네온 빛 효과 선 드로잉 헬퍼
        function drawNeonLine(points, color, width, glowStyle, dashPattern = null) {
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }

            if (dashPattern) {
                ctx.setLineDash(dashPattern);
            }

            // 그림자 블러로 광원 연출
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.shadowBlur = 10;
            ctx.shadowColor = color;
            ctx.stroke();
            ctx.restore();
        }

        // CSS 변수 획득 헬퍼
        function varColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        // 범례 박스 렌더러
        function drawLegend(x, y, diffColor) {
            ctx.save();
            ctx.font = '700 11px "Outfit", sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';

            const items = [
                { label: "⚡ 플레이어 누적 화력 (PLAYER STAT)", color: varColor('--neon-cyan') },
                { label: "👾 몬스터 기본 공격력/HP (MONSTER STAT)", color: varColor('--neon-magenta') },
                { label: "⚠️ 체감 난이도 (PERCEIVED DIFFICULTY)", color: diffColor, dashed: true }
            ];

            items.forEach((item, idx) => {
                let curY = y + idx * 22;
                ctx.beginPath();
                ctx.moveTo(x, curY);
                ctx.lineTo(x + 25, curY);
                ctx.strokeStyle = item.color;
                ctx.lineWidth = 3;
                if (item.dashed) {
                    ctx.setLineDash([3, 3]);
                } else {
                    ctx.setLineDash([]);
                }
                ctx.stroke();

                ctx.fillStyle = '#fff';
                ctx.fillText(item.label, x + 35, curY);
            });
            ctx.restore();
        }

        // 초기 엔진 기동
        document.addEventListener('DOMContentLoaded', () => {
            switchModel('A', document.querySelector('.proposal-card-btn'));
        });
    </script>
</body>

</html>
